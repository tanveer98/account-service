<div style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5;">
  <mat-card style="width: 350px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <mat-card-header>
      <mat-card-title style="color: #3f51b5; font-size: 24px; margin-bottom: 16px;">Create Account</mat-card-title>
    </mat-card-header>
    <mat-card-content style="margin-top: 10px;">
      <mat-form-field appearance="outline" style="width: 100%;">
        <mat-label>Full Name</mat-label>
        <input matInput [(ngModel)]="name" placeholder="John Doe" (keyup.enter)="onRegister()">
      </mat-form-field>

      @if (errorMessage) {
        <p style="color: red; font-size: 14px; margin-top: -8px;">{{ errorMessage }}</p>
      }

      @if (successMessage) {
        <div style="background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 4px; font-size: 14px; margin-top: 8px;">
          {{ successMessage }}
        </div>
      }
    </mat-card-content>
    <mat-card-actions style="display: flex; flex-direction: column; gap: 10px; padding: 0 8px;">
      <button mat-raised-button color="primary" style="width: 100%;" (click)="onRegister()">Register</button>
      <button mat-button color="accent" routerLink="/login" style="width: 100%;">Already registered? Login</button>
    </mat-card-actions>
  </mat-card>
</div>

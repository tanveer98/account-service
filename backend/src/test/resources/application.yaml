spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: account-service
    password: "password1234"
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
  data:
    web:
      pageable:
        default-page-size: 100